<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRM Khách Hàng</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
}

.header {
  background: #4A90E2;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #4A90E2;
  color: white;
  font-size: 15px;
}

button:active {
  opacity: 0.8;
}

.item {
  background: white;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.map {
  width: 100%;
  height: 180px;
  border-radius: 10px;
  margin-top: 8px;
  border: none;
}

.small {
  font-size: 12px;
  color: gray;
}
</style>

</head>

<body>

<div class="header">📱 CRM Khách Hàng</div>

<div class="container">

<!-- FORM -->
<div class="card">
  <input id="ten" placeholder="👤 Tên khách hàng">
  <input id="sdt" placeholder="📞 Số điện thoại">
  <input id="diachi" placeholder="🏠 Địa chỉ">

  <button onclick="layViTri()">📍 Lấy vị trí</button>
  <button onclick="gui()">💾 Lưu khách</button>

  <div class="small" id="gpsStatus"></div>
</div>

<!-- SEARCH -->
<div class="card">
  <input id="search" placeholder="🔍 Tìm kiếm..." oninput="loadData()">
</div>

<!-- LIST -->
<div id="list"></div>

</div>

<script>

var URL = "https://script.google.com/macros/s/AKfycbwqzv4JztF4tOuwRswHECYU4mDRPZPN-q_6zNn49KDbIfIb78wulpOvhWaS6KPGzWUZ/exec"; // 🔥 DÁN LINK APPS SCRIPT

var lat = "";
var lng = "";

// 📍 LẤY GPS
function layViTri() {
  if (!navigator.geolocation) {
    alert("Thiết bị không hỗ trợ GPS");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;
      document.getElementById("gpsStatus").innerText =
        "📍 " + lat + ", " + lng;
    },
    err => {
      alert("❌ Lỗi GPS: " + err.message);
    }
  );
}

// 💾 GỬI DATA
function gui() {
  var data = {
    ten: document.getElementById("ten").value,
    sdt: document.getElementById("sdt").value,
    diachi: document.getElementById("diachi").value,
    lat: lat,
    lng: lng
  };

  if (!data.ten) {
    alert("Nhập tên khách!");
    return;
  }

  fetch(URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    loadData();
    document.getElementById("ten").value = "";
    document.getElementById("sdt").value = "";
    document.getElementById("diachi").value = "";
  });
}

// 📥 LOAD DATA
function loadData() {
  fetch(URL)
  .then(res => res.json())
  .then(data => {

    var html = "";
    var keyword = document.getElementById("search").value.toLowerCase();

    data.forEach((row, index) => {

      if (row[0].toLowerCase().includes(keyword) || row[1].includes(keyword)) {

        html += `
          <div class="item">
            <b>${row[0]}</b><br>
            📞 ${row[1]}<br>
            🏠 ${row[2]}<br>

            ${
              row[4] && row[5]
              ? `<iframe class="map"
                   src="https://maps.google.com/maps?q=${row[4]},${row[5]}&z=15&output=embed"></iframe>`
              : `<div class="small">Không có vị trí</div>`
            }

            <button onclick="xoa(${index})">🗑️ Xóa</button>
          </div>
        `;
      }

    });

    document.getElementById("list").innerHTML = html;
  });
}

// 🗑️ XÓA (FIX CHUẨN)
function xoa(index) {
  if (!confirm("Xóa khách này?")) return;

  fetch(URL + "?action=delete&index=" + index)
  .then(() => loadData());
}

// AUTO LOAD
loadData();

</script>

</body>
</html>
